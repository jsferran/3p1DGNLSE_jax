name: WMCO_GNLSE_env
# Tested with: Python 3.10, JAX 0.6.2, CUDA 12.x
# -------------------------------------------------------
# Create:  conda env create -f environment.yml
# Activate: conda activate WMCO_GNLSE_env
# Update:  conda env update -f environment.yml --prune
#
# GPU NOTE: JAX is installed with CUDA 12 support below.
# This requires an NVIDIA GPU with CUDA 12.x drivers on the host.
# For CPU-only use, replace  "jax[cuda12]==0.6.2"  with  "jax==0.6.2".
# -------------------------------------------------------

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # Jupyter kernel and notebook environment
  - ipykernel
  - jupyterlab

  - pip:
      # ---- JAX (GPU) ------------------------------------------------
      # Installs jaxlib + CUDA 12 plugin wheels automatically.
      # Match your driver: https://jax.readthedocs.io/en/latest/installation.html
      - "jax[cuda12]==0.6.2"

      # ---- Scientific computing -------------------------------------
      - numpy==1.26.4
      - scipy==1.14.1
      - scikit-learn

      # ---- Plotting -------------------------------------------------
      - matplotlib==3.8.3
      - pillow==10.2.0

      # ---- Utilities ------------------------------------------------
      - tqdm==4.66.2
      - pandas==1.3.5

      # ---- Presentation generation ----------------------------------
      # Used by gnlse_visualizations_prototype.py to write .pptx files
      - python-pptx==1.0.2
